name: Build Windows Binaries
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  build-windows:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install deps
      run: sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config mingw-w64 g++-mingw-w64-x86-64 curl python3 nsis
    - name: Boost
      run: |
        mkdir -p depends/sources
        wget -q "https://archives.boost.io/release/1.71.0/source/boost_1_71_0.tar.bz2" -O depends/sources/boost_1_71_0.tar.bz2
    - name: Build depends
      run: cd depends && make HOST=x86_64-w64-mingw32 -j$(nproc) NO_QT=1 NO_ZMQ=1
    - name: Configure
      run: |
        ./autogen.sh
        CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure \
          --prefix=/ \
          --host=x86_64-w64-mingw32 \
          --disable-tests \
          --disable-bench \
          --without-gui \
          --without-miniupnpc \
          --disable-zmq \
          CXXFLAGS="-O2"
    - name: Build
      run: make -j$(nproc) src/hashlatchd.exe src/hashlatch-cli.exe
    - name: Package
      run: |
        x86_64-w64-mingw32-strip src/hashlatchd.exe src/hashlatch-cli.exe
        mkdir hashlatch-windows
        cp src/hashlatchd.exe src/hashlatch-cli.exe hashlatch-windows/
        cat > hashlatch-windows/README.txt << 'TXT'
HashLatch Node - Windows x64

FILES:
  hashlatchd.exe      - Full node daemon
  hashlatch-cli.exe   - CLI wallet

QUICK START:
  hashlatchd.exe -daemon
  hashlatch-cli.exe getblockcount
  hashlatch-cli.exe addnode 34.185.173.154:18767 add

MINING:
  Pool: stratum+tcp://34.185.173.154:3052
  Worker: YOUR_ADDRESS.rig1
  Password: x

https://hashlatch.online
TXT
        zip -r hashlatch-windows-x64.zip hashlatch-windows/
    - uses: actions/upload-artifact@v4
      with:
        name: hashlatch-windows-x64
        path: hashlatch-windows-x64.zip
        retention-days: 30
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: hashlatch-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
