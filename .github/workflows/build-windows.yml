name: Build Windows Binaries
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  build-windows:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install deps
      run: sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config mingw-w64 g++-mingw-w64-x86-64 curl python3
    - name: Boost
      run: |
        mkdir -p depends/sources
        wget -q "https://archives.boost.io/release/1.71.0/source/boost_1_71_0.tar.bz2" -O depends/sources/boost_1_71_0.tar.bz2
    - name: Build depends
      run: cd depends && make HOST=x86_64-w64-mingw32 -j$(nproc) NO_QT=1
    - name: Configure
      run: |
        ./autogen.sh
        CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=/ --host=x86_64-w64-mingw32 --disable-tests --disable-bench --without-gui --without-miniupnpc --disable-zmq CXXFLAGS="-O2 -Wno-error"
    - name: Build
      run: make -j$(nproc) -C src hashlatch-cli.exe hashlatchd.exe
    - name: Package
      run: |
        find . -name "hashlatch-cli.exe" | head -3
        mkdir -p hashlatch-windows
        find . -name "hashlatch-cli.exe" -o -name "hashlatchd.exe" | xargs -I{} cp {} hashlatch-windows/
        echo "HashLatch CLI - Windows x64" > hashlatch-windows/README.txt
        echo "Usage: hashlatch-cli.exe -rpcconnect=34.185.173.154 -rpcport=8766 -rpcuser=hashlatch -rpcpassword=test123 getblockcount" >> hashlatch-windows/README.txt
        echo "Mining pool: stratum+tcp://34.185.173.154:3052" >> hashlatch-windows/README.txt
        zip -r hashlatch-windows-x64.zip hashlatch-windows/
    - uses: actions/upload-artifact@v4
      with:
        name: hashlatch-windows-x64
        path: hashlatch-windows-x64.zip
        retention-days: 30
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: hashlatch-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
